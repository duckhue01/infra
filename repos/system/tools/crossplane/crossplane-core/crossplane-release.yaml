apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crossplane-core
  namespace: flux-system
spec:
  releaseName: crossplane-core
  interval: 5m
  chart:
    spec:
      chart: crossplane
      version: 'v3.2.0'
      sourceRef:
        kind: HelmRepository
        name: crossplane-repository
        namespace: crossplane-system
      interval: 1m
  values:
    args:
      - "--enable-operations"
